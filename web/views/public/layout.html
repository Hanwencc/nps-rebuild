<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title langtag="title-admin"></title>

    <!-- Tailwind CSS (Play CDN – scans runtime classes) -->
    <script src="{{.web_base_url}}/static/js/tailwind.min.js"></script>
    <!-- Tailwind config -->
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { DEFAULT:'#4f46e5', dark:'#4338ca', light:'#818cf8' } } } }
        }
    </script>

    <!-- FontAwesome -->
    <link href="{{.web_base_url}}/static/css/fontawesome.min.css" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/solid.min.css" rel="stylesheet">

    <!-- Toastr -->
    <link href="{{.web_base_url}}/static/css/toastr.min.css" rel="stylesheet">

    <!-- NPS custom overrides -->
    <link href="{{.web_base_url}}/static/css/nps.css" rel="stylesheet">

    <!-- Alpine.js (deferred so it initialises after DOM) -->
    <script defer src="{{.web_base_url}}/static/js/alpine.min.js"></script>
</head>

<body class="bg-gray-100 font-sans antialiased"
      x-data="{ sidebarOpen: window.innerWidth >= 1024 }"
      x-init="$watch('sidebarOpen', v => localStorage.setItem('sb', v));
               if(localStorage.getItem('sb') !== null) sidebarOpen = localStorage.getItem('sb') === 'true'">

<!-- Mobile overlay -->
<div x-show="sidebarOpen && window.innerWidth < 1024"
     @click="sidebarOpen=false"
     class="fixed inset-0 bg-black/40 z-40 lg:hidden"
     style="display:none"></div>

<!-- ==================== SIDEBAR ==================== -->
<aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
       class="fixed inset-y-0 left-0 z-50 w-64 bg-gray-900 flex flex-col transform transition-transform duration-300 ease-in-out lg:translate-x-0">

    <!-- Logo / User area -->
    <div class="flex items-center gap-3 px-5 py-4 border-b border-gray-700/60 shrink-0">
        <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center shrink-0">
            {{if eq true .isAdmin}}
            <i class="fa fa-user-cog text-white text-sm"></i>
            {{else}}
            <i class="fa fa-user text-white text-sm"></i>
            {{end}}
        </div>
        <div class="min-w-0">
            {{if eq true .isAdmin}}
            <p class="text-white text-sm font-semibold truncate" langtag="word-admin"></p>
            <p class="text-gray-400 text-xs truncate" langtag="word-system"></p>
            {{else}}
            <p class="text-white text-sm font-semibold truncate">{{.username}}</p>
            <p class="text-gray-400 text-xs truncate" langtag="word-user"></p>
            {{end}}
        </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto py-3 px-3 space-y-0.5">
        <a href="{{.web_base_url}}/"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "index" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-tachometer-alt w-4 text-center"></i>
            <span langtag="word-dashboard"></span>
        </a>
        <a href="{{.web_base_url}}/client/list"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "client" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-desktop w-4 text-center"></i>
            <span langtag="word-client"></span>
        </a>

        <!-- Divider label -->
        <p class="px-3 pt-3 pb-1 text-xs font-semibold uppercase text-gray-500 tracking-wider">Tunnels</p>

        <a href="{{.web_base_url}}/index/hostlist"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "host" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-globe w-4 text-center"></i>
            <span langtag="scheme-host"></span>
        </a>
        <a href="{{.web_base_url}}/index/tcp"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "tcp" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-retweet w-4 text-center"></i>
            <span langtag="scheme-tcp"></span>
        </a>
        <a href="{{.web_base_url}}/index/udp"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "udp" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-random w-4 text-center"></i>
            <span langtag="scheme-udp"></span>
        </a>
        <a href="{{.web_base_url}}/index/http"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "http" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-server w-4 text-center"></i>
            <span langtag="scheme-httpproxy"></span>
        </a>
        <a href="{{.web_base_url}}/index/socks5"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "socks5" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-layer-group w-4 text-center"></i>
            <span langtag="scheme-socks5"></span>
        </a>
        <a href="{{.web_base_url}}/index/secret"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "secret" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-low-vision w-4 text-center"></i>
            <span langtag="scheme-secret"></span>
        </a>
        <a href="{{.web_base_url}}/index/p2p"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "p2p" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-exchange-alt w-4 text-center"></i>
            <span langtag="scheme-p2p"></span>
        </a>
        <a href="{{.web_base_url}}/index/file"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "file" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-briefcase w-4 text-center"></i>
            <span langtag="scheme-file"></span>
        </a>

        <p class="px-3 pt-3 pb-1 text-xs font-semibold uppercase text-gray-500 tracking-wider">System</p>

        <a href="{{.web_base_url}}/global/index"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                  {{if eq "global" .menu}}bg-indigo-600 text-white{{else}}text-gray-400 hover:text-white hover:bg-gray-800{{end}}">
            <i class="fa fa-cog w-4 text-center"></i>
            <span langtag="word-globalparam"></span>
        </a>
        <a href="https://ehang.io/nps/documents" target="_blank"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-gray-800 transition-colors">
            <i class="fa fa-lightbulb w-4 text-center"></i>
            <span langtag="word-help"></span>
        </a>
    </nav>

    <!-- Sidebar footer -->
    <div class="px-4 py-3 border-t border-gray-700/60 shrink-0">
        <p class="text-xs text-gray-500 text-center" langtag="application"></p>
    </div>
</aside>

<!-- ==================== MAIN AREA ==================== -->
<div :class="sidebarOpen ? 'lg:pl-64' : ''"
     class="flex flex-col min-h-screen transition-all duration-300 ease-in-out">

    <!-- Top bar -->
    <header class="sticky top-0 z-30 bg-white border-b border-gray-200 px-4 py-2.5 flex items-center justify-between shadow-sm">
        <!-- Toggle -->
        <button @click="sidebarOpen = !sidebarOpen"
                class="p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition-colors">
            <i class="fa fa-bars"></i>
        </button>

        <!-- Right side -->
        <div class="flex items-center gap-3">
            <!-- Welcome -->
            <span class="hidden md:inline text-sm text-gray-500">
                <span langtag="word-welcome"></span>
                <a href="https://github.com/yisier/nps" class="text-indigo-600 hover:underline ml-1" langtag="application"></a>
            </span>

            <!-- Language dropdown -->
            <div class="relative" x-data="{ open: false }">
                <button id="languagemenu"
                        @click="open = !open"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-100 hover:bg-gray-200 text-sm text-gray-700 transition-colors">
                    <i class="fa fa-globe-asia"></i>
                    <span class="text-xs"></span>
                    <i class="fa fa-chevron-down text-xs text-gray-400 ml-0.5"></i>
                </button>
                <ul id="languagedropdown"
                    x-show="open"
                    @click.outside="open=false"
                    x-transition
                    class="absolute right-0 mt-1.5 w-36 bg-white rounded-xl shadow-lg border border-gray-100 py-1 z-50"
                    style="display:none"></ul>
            </div>

            <!-- Logout -->
            <a href="{{.web_base_url}}/login/out"
               class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm text-gray-600 hover:text-red-600 hover:bg-red-50 transition-colors">
                <i class="fa fa-sign-out-alt"></i>
                <span langtag="word-logout"></span>
            </a>
        </div>
    </header>

<!-- Scripts (must load BEFORE LayoutContent so page scripts can use $ and bootstrapTable) -->
<script src="{{.web_base_url}}/static/js/jquery-3.4.1.min.js"></script>
<script src="{{.web_base_url}}/static/js/clipboard.min.js"></script>
<script src="{{.web_base_url}}/static/js/toastr.min.js"></script>
<script src="{{.web_base_url}}/static/js/echarts.min.js"></script>
<script src="{{.web_base_url}}/static/js/nps-table.js"></script>
<script>
    window.nps = { "web_base_url": {{.web_base_url}} };
</script>

    <!-- Page content -->
    <main class="flex-1 p-5 nps-fadein">
        {{.LayoutContent}}
    </main>

    <!-- Footer -->
    <footer class="px-5 py-3 border-t border-gray-100 text-xs text-gray-400 flex items-center justify-between">
        <span><strong langtag="word-copyright"></strong> &nbsp;<span langtag="application"></span> &copy; 2018-2025</span>
        <span><span langtag="word-readmore"></span> <a href="https://ehang.io/nps" class="text-indigo-500 hover:underline" langtag="word-go"></a></span>
    </footer>
</div>

<!-- language.js after content so langtag elements exist in DOM -->
<script src="{{.web_base_url}}/static/js/language.js?v=202512054"></script>
<script>
    /* Language dropdown: language.js appends to next() of #languagemenu */
    (function() {
        var $menu = $('#languagemenu');
        if ($menu.next().attr('id') !== 'languagedropdown') {
            $menu.after($menu.next());
        }
    })();
</script>
</body>
</html>
