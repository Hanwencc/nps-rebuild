<div class="space-y-5">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100">
            <h3 class="text-base font-semibold text-gray-800" langtag="page-hostlist"></h3>
        </div>
        <div class="p-5">
            <div id="toolbar">
                <a href="{{.web_base_url}}/index/addhost?vkey={{.task_id}}&client_id={{.client_id}}"
                   class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg shadow-sm transition-colors">
                    <i class="fa fa-plus"></i> <span langtag="word-add"></span>
                </a>
            </div>
            <table id="table"></table>
        </div>
    </div>
</div>
<script>
$('#table').bootstrapTable({
    toolbar: "#toolbar",
    method: 'post',
    url: window.location,
    contentType: "application/x-www-form-urlencoded",
    striped: true,
    search: true,
    showRefresh: true,
    pagination: true,
    sidePagination: 'server',
    pageNumber: 1,
    pageList: [5, 10, 20, 50],
    detailView: true,
    queryParams: function(params) { return { offset: params.offset, limit: params.limit, search: params.search }; },
    onExpandRow: function() { $('body').setLang('.detail-view'); },
    onPostBody: function() { if ($(this)[0].locale != undefined) $('body').setLang('#table'); },
    detailFormatter: function(index, row) {
        return '<b langtag="word-exportflow"></b>: ' + changeunit(row.Flow.ExportFlow) + '&emsp;'
            + '<b langtag="word-inletflow"></b>: ' + changeunit(row.Flow.InletFlow) + '&emsp;'
            + '<b langtag="word-crypt"></b>: ' + row.Client.Cnf.Crypt + '&emsp;'
            + '<b langtag="word-compress"></b>: ' + row.Client.Cnf.Compress + '&emsp;'
            + '<b langtag="word-basicusername"></b>: ' + row.Client.Cnf.U + '&emsp;'
            + '<b langtag="word-basicpassword"></b>: ' + row.Client.Cnf.P + '&emsp;<br/><br>'
            + '<b langtag="word-httpscert"></b>: ' + row.CertFilePath + '&emsp;'
            + '<b langtag="word-httpskey"></b>: ' + row.KeyFilePath + '&emsp;<br/><br>'
            + '<b langtag="word-requestheader"></b>: ' + row.HeaderChange + '&emsp;<br/><br>'
            + '<b langtag="word-requesthost"></b>: ' + row.HostChange;
    },
    columns: [
        { field: 'Id', title: '<span langtag="word-id"></span>', halign: 'center', visible: true },
        { field: 'Id', title: '<span langtag="word-clientid"></span>', halign: 'center', visible: true,
          formatter: function(v, row) { return row.Client.Id + '-' + row.Client.Remark; } },
        { field: 'Remark', title: '<span langtag="word-remark"></span>', halign: 'center', visible: true },
        { field: 'Client.VerifyKey', title: '<span langtag="word-verifykey"></span>', halign: 'center', visible: true },
        { field: 'Host', title: '<span langtag="word-host"></span>', halign: 'center', visible: true,
          formatter: function(v, row) { var h = row.Host + '{{.http_proxy_port}}'; return '<a href="http://' + h + '" target="_blank" class="text-indigo-600 hover:underline">' + h + '</a>'; } },
        { field: 'Scheme', title: '<span langtag="word-scheme"></span>', halign: 'center', visible: true,
          formatter: function(v) { return '<span langtag="word-' + v + '"></span>'; } },
        { field: 'Target', title: '<span langtag="word-target"></span>', halign: 'center', visible: true,
          formatter: function(v, row) { return row.Target.TargetStr; } },
        { field: 'Location', title: '<span langtag="word-location"></span>', halign: 'center', visible: true },
        { field: 'IsClose', title: '<span langtag="word-status"></span>', align: 'center', halign: 'center', visible: true,
          formatter: function(v) { return !v ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700" langtag="word-open"></span>' : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-500" langtag="word-close"></span>'; } },
        { field: '', title: '<span langtag="word-clientstatus"></span>', align: 'center', halign: 'center', visible: true,
          formatter: function(v, row) {
            var hosturl = ((row.Scheme == 'http') ? 'http://' : 'https://') + row.Host + row.Location;
            return row.Client.IsConnect
                ? '<a href="' + hosturl + '" target="_blank"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700" langtag="word-online"></span></a>'
                : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-500" langtag="word-offline"></span>';
          } },
        { field: 'option', title: '<span langtag="word-option"></span>', align: 'center', halign: 'center', visible: true,
          formatter: function(v, row) {
            var g = '<div class="flex items-center justify-center gap-1">';
            if (!row.IsClose) {
                g += '<a onclick="submitform(\'stop\',\'{{.web_base_url}}/index/hoststop\',{\'id\':' + row.Id + '})" class="inline-flex items-center justify-center w-7 h-7 rounded-lg border border-amber-400 text-amber-600 hover:bg-amber-50 cursor-pointer"><i class="fa fa-pause text-xs"></i></a>';
            } else {
                g += '<a onclick="submitform(\'start\',\'{{.web_base_url}}/index/hoststart\',{\'id\':' + row.Id + '})" class="inline-flex items-center justify-center w-7 h-7 rounded-lg border border-indigo-400 text-indigo-600 hover:bg-indigo-50 cursor-pointer"><i class="fa fa-play text-xs"></i></a>';
            }
            g += '<a onclick="submitform(\'delete\',\'{{.web_base_url}}/index/delhost\',{\'id\':' + row.Id + '})" class="inline-flex items-center justify-center w-7 h-7 rounded-lg border border-red-400 text-red-500 hover:bg-red-50 cursor-pointer"><i class="fa fa-trash text-xs"></i></a>';
            g += '<a href="{{.web_base_url}}/index/edithost?id=' + row.Id + '" class="inline-flex items-center justify-center w-7 h-7 rounded-lg border border-green-400 text-green-600 hover:bg-green-50"><i class="fa fa-edit text-xs"></i></a>';
            g += '</div>';
            return g;
          } }
    ]
});
</script>
