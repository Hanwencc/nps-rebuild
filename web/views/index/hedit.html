<div class="max-w-2xl mx-auto space-y-5">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100">
            <h3 class="text-base font-semibold text-gray-800" langtag="page-hostedit"></h3>
        </div>
        <div class="p-6">
            <form class="space-y-4" onsubmit="return false">
                <input type="hidden" name="id" value="{{.h.Id}}">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-clientid"></label>
                    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="client_id" value="{{.h.Client.Id}}" langtag="word-clientid">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-remark"></label>
                    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="remark" value="{{.h.Remark}}" placeholder="remark">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-host"></label>
                    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="host" value="{{.h.Host}}" langtag="info-suchashost">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-scheme"></label>
                    <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" id="scheme_select" name="scheme">
                        <option {{if eq "all" .h.Scheme}}selected{{end}} value="all" langtag="word-all"></option>
                        <option {{if eq "http" .h.Scheme}}selected{{end}} value="http" langtag="word-http"></option>
                        <option {{if eq "https" .h.Scheme}}selected{{end}} value="https" langtag="word-https"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">自动HTTPS（301）</label>
                    <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" name="AutoHttps">
                        <option {{if eq false .h.AutoHttps}}selected{{end}} value="0" langtag="word-no"></option>
                        <option {{if eq true .h.AutoHttps}}selected{{end}} value="1" langtag="word-yes"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-httpscert"></label>
                    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none" rows="5" name="cert_file_path" id="pemText"
                        placeholder="请将证书文件拖拽或将内容复制粘贴到此处，证书文件格式为：xxxx_example.com.pem。或者配置证书文件路径。">{{.h.CertFilePath}}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-httpskey"></label>
                    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none" rows="5" name="key_file_path" id="pemKey"
                        placeholder="请将私钥文件拖拽或复制粘贴到此处，证书秘钥格式为：xxxx_example.com.key。或者配置秘钥文件路径。">{{.h.KeyFilePath}}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-urlroute"></label>
                    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="location" value="{{.h.Location}}" langtag="info-unrestricted">
                </div>
                {{if eq true .allow_local_proxy}}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-proxytolocal"></label>
                    <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" name="local_proxy">
                        <option {{if eq false .h.Target.LocalProxy}}selected{{end}} value="0" langtag="word-no"></option>
                        <option {{if eq true .h.Target.LocalProxy}}selected{{end}} value="1" langtag="word-yes"></option>
                    </select>
                </div>
                {{end}}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-target"></label>
                    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none" rows="4" name="target" langtag="info-suchasiplist">{{.h.Target.TargetStr}}</textarea>
                    <p class="mt-1 text-xs text-gray-500" langtag="info-targethost"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-requestheader"></label>
                    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none" rows="3" name="header" placeholder="Cache-Control: no-cache">{{.h.HeaderChange}}</textarea>
                    <p class="mt-1 text-xs text-gray-500" langtag="info-header"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-requesthost"></label>
                    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="hostchange" value="{{.h.HostChange}}" langtag="word-requesthost">
                </div>
                <div class="border-t border-gray-100 pt-4">
                    <button type="button" onclick="submitform('edit', '{{.web_base_url}}/index/edithost', $('form').serializeArray())"
                        class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
                        <i class="fa fa-check-circle"></i> <span langtag="word-save"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
$(function() {
    document.addEventListener("dragover", function(e) { e.preventDefault(); });
    function dropHandler(el) {
        el.addEventListener("drop", function(e) {
            e.preventDefault();
            var f = e.dataTransfer.files[0];
            if (!f) return;
            var r = new FileReader();
            r.onload = function(ev) { el.value = ev.target.result; };
            r.readAsText(f);
        });
    }
    dropHandler(document.getElementById("pemText"));
    dropHandler(document.getElementById("pemKey"));
});
</script>
