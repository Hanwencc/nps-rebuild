<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
<div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
  <h3 class="text-base font-semibold text-gray-800"><span id="langtag"></span><span id="langtag_extra"></span></h3>
  <div id="toolbar">
    <a href="{{.web_base_url}}/index/add?type={{.type}}&client_id={{.client_id}}"
       class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
      <i class="fa fa-plus"></i> <span langtag="word-add"></span>
    </a>
  </div>
</div>
<div class="p-4">
  <table id="table"></table>
</div>
</div>
<script>
var bridgeType = "{{.bridgeType}}";
name = "{{.name}}:".replace(/\s*/g,"");
document.getElementById("langtag").setAttribute("langtag", "page-list" + name.replace(/:.*/,""));
document.getElementById("langtag_extra").textContent = name.split(":")[1] || "";

$(function(){
  if(typeof $("body").setLang==="function") $("body").setLang("#langtag");
});

$("#table").bootstrapTable({
  toolbar: "#toolbar",
  method: "post",
  url: "{{.web_base_url}}/index/gettunnel",
  queryParams: function(params) {
    return { offset: params.offset, limit: params.limit, type: {{.type}}, client_id: {{.client_id}}, search: params.search, sort: params.sort, order: params.order };
  },
  search: true,
  contentType: "application/x-www-form-urlencoded",
  showRefresh: true,
  pagination: true,
  sidePagination: "server",
  pageNumber: 1,
  pageList: [5, 10, 20, 50],
  detailView: true,
  onExpandRow: function(){ $("body").setLang(".detail-view"); },
  onLoadSuccess: function(){ $("body").setLang(".detail-view"); },
  onPostBody: function(data){ if($(this)[0].locale!=undefined) $("body").setLang("#table"); },
  detailFormatter: function(index, row) {
    var tmp = "<b langtag=\"word-exportflow\"></b>: " + changeunit(row.Flow.ExportFlow) + "&emsp;"
      + "<b langtag=\"word-inletflow\"></b>: " + changeunit(row.Flow.InletFlow) + "&emsp;"
      + "<b langtag=\"word-crypt\"></b>: " + row.Client.Cnf.Crypt + "&emsp;"
      + "<b langtag=\"word-compress\"></b>: " + row.Client.Cnf.Compress + "&emsp;"
      + "<b langtag=\"word-basicusername\"></b>: " + row.Client.Cnf.U + "&emsp;"
      + "<b langtag=\"word-basicpassword\"></b>: " + row.Client.Cnf.P + "&emsp;"
      + "<b langtag=\"word-protoversion\"></b>: " + row.ProtoVersion + "&emsp;";
    if (row.Mode == "p2p") {
      return tmp + "<br><br><b langtag=\"word-commandaccessp2p\"></b>: <code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + row.Client.VerifyKey + " -type=" + bridgeType + " -password=" + row.Password + " -target=" + row.Target.TargetStr + "</code>"
        + "<br><br><b langtag=\"word-commandaccessp2ps\"></b>: <code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + row.Client.VerifyKey + " -type=" + bridgeType + " -password=" + row.Password + " -local_type=p2ps</code>"
        + "<br><br><b langtag=\"word-commandaccessp2pt\"></b>: <code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + row.Client.VerifyKey + " -type=" + bridgeType + " -password=" + row.Password + " -local_type=p2pt</code>";
    }
    if (row.Mode == "secret") {
      return tmp + "<br><br><b langtag=\"word-commandaccess\"></b>: <code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + row.Client.VerifyKey + " -type=" + bridgeType + " -password=" + row.Password + " -local_type=secret</code>";
    }
    return tmp;
  },
  columns: [
    { field: "Id", title: '<span langtag="word-id"></span>', halign: "center", sortable: true },
    { field: "ClientId", title: '<span langtag="word-clientid"></span>', halign: "center", sortable: true, formatter: function(v,row){ return row.Client.Id + "-" + row.Client.Remark; } },
    { field: "Remark", title: '<span langtag="word-remark"></span>', halign: "center" },
    { field: "Client.VerifyKey", title: '<span langtag="word-verifykey"></span>', halign: "center", sortable: true },
    { field: "Mode", title: '<span langtag="word-scheme"></span>', halign: "center", formatter: function(v){ return '<span langtag="scheme-'+v+'"></span>'; } },
    { field: "Port", title: '<span langtag="word-port"></span>', halign: "center", sortable: true },
    { field: "address", title: '<span langtag="word-accessaddress"></span>', halign: "center", formatter: function(v,row){ var a={{.ip}}+":"+row.Port; return '<a href="http://'+a+'" target="_blank">'+a+'</a>'; } },
    { field: "Target", title: '<span langtag="word-target"></span>', halign: "center", sortable: true, formatter: function(v,row){ return row.Target.TargetStr; } },
    { field: "Password", title: '<span langtag="word-identificationkey"></span>', halign: "center" },
    { field: "Status", title: '<span langtag="word-status"></span>', align: "center", halign: "center", formatter: function(v){ return v ? '<span class="px-2 py-0.5 text-xs rounded-full bg-green-100 text-green-700" langtag="word-open"></span>' : '<span class="px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-500" langtag="word-close"></span>'; } },
    { field: "RunStatus", title: '<span langtag="word-runstatus"></span>', align: "center", halign: "center", formatter: function(v){ return v ? '<span class="px-2 py-0.5 text-xs rounded-full bg-green-100 text-green-700" langtag="word-open"></span>' : '<span class="px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-500" langtag="word-close"></span>'; } },
    { field: "", title: '<span langtag="word-clientstatus"></span>', align: "center", halign: "center", formatter: function(v,row){ return row.Client.IsConnect ? '<span class="px-2 py-0.5 text-xs rounded-full bg-indigo-100 text-indigo-700" langtag="word-online"></span>' : '<span class="px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-500" langtag="word-offline"></span>'; } },
    { field: "option", title: '<span langtag="word-option"></span>', align: "center", halign: "center",
      formatter: function(v, row) {
        var btns = "";
        if (row.Status) {
          btns += "<button onclick=\"submitform('stop','{{.web_base_url}}/index/stop',{id:"+row.Id+"})\""
               + " class=\"inline-flex items-center px-2 py-1 text-xs rounded-md bg-amber-100 text-amber-700 hover:bg-amber-200 mr-1\"><i class=\"fa fa-pause\"></i></button>";
        } else {
          btns += "<button onclick=\"submitform('start','{{.web_base_url}}/index/start',{id:"+row.Id+"})\""
               + " class=\"inline-flex items-center px-2 py-1 text-xs rounded-md bg-indigo-100 text-indigo-700 hover:bg-indigo-200 mr-1\"><i class=\"fa fa-play\"></i></button>";
        }
        btns += "<button onclick=\"submitform('delete','{{.web_base_url}}/index/del',{id:"+row.Id+"})\""
             + " class=\"inline-flex items-center px-2 py-1 text-xs rounded-md bg-red-100 text-red-700 hover:bg-red-200 mr-1\"><i class=\"fa fa-trash\"></i></button>";
        btns += "<a href=\"{{.web_base_url}}/index/edit?id="+row.Id+"\""
             + " class=\"inline-flex items-center px-2 py-1 text-xs rounded-md bg-green-100 text-green-700 hover:bg-green-200 mr-1\"><i class=\"fa fa-edit\"></i></a>";
        btns += "<button onclick=\"submitform('copy','{{.web_base_url}}/index/copy',{id:"+row.Id+"})\""
             + " class=\"inline-flex items-center px-2 py-1 text-xs rounded-md bg-blue-100 text-blue-700 hover:bg-blue-200\"><i class=\"fa fa-copy\"></i></button>";
        return btns;
      }
    }
  ]
});
</script>
