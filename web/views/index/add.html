<div class="max-w-3xl mx-auto space-y-5">
<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
<div class="px-6 py-4 border-b border-gray-100">
  <h3 class="text-base font-semibold text-gray-800" langtag="page-add"></h3>
</div>
<div class="p-6">
<form class="space-y-4" onsubmit="return false">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-scheme"></label>
    <p class="text-xs text-gray-500 mb-1"><span class="font-semibold" langtag="word-usecase"></span>: <span id="usecase"><span id="casetcp" langtag="info-casetcp"></span><span id="caseudp" langtag="info-caseudp"></span><span id="casehttpProxy" langtag="info-casehttpproxy"></span><span id="casesocks5" langtag="info-casesocks5"></span><span id="casesecret" langtag="info-casesecret"></span><span id="casep2p" langtag="info-casep2p"></span><span id="casefile" langtag="info-casefile"></span></span></p>
    <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" name="type" id="type">
      <option value="tcp" langtag="scheme-tcp"></option>
      <option value="udp" langtag="scheme-udp"></option>
      <option value="httpProxy" langtag="scheme-httpProxy"></option>
      <option value="socks5" langtag="scheme-socks5"></option>
      <option value="secret" langtag="scheme-secret"></option>
      <option value="p2p" langtag="scheme-p2p"></option>
    </select>
  </div>
  <div id="client_id">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-clientid"></label>
    <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" name="client_id" id="nps_client_id" langtag="word-belongclient"></select>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-remark"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="remark" langtag="info-unrestricted">
  </div>
{{if eq true .allow_multi_ip}}
  <div id="server_ip">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-serverip"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" value="0.0.0.0" name="server_ip" langtag="info-suchasip">
  </div>
{{end}}
  <div id="port">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-serverport"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="port" langtag="info-suchasport">
  </div>
{{if eq true .allow_local_proxy}}
  <div id="local_proxy">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-proxytolocal"></label>
    <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" name="local_proxy">
      <option value="0" langtag="word-no"></option>
      <option value="1" langtag="word-yes"></option>
    </select>
  </div>
{{end}}
  <div id="target">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-target"></label>
    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none" name="target" rows="4" langtag="info-suchasiplist"></textarea>
    <p class="mt-1 text-xs text-gray-500" langtag="info-targettunnel"></p>
  </div>
  <div id="local_path">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-localpath"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="local_path" langtag="info-suchaslocalpath">
  </div>
  <div id="strip_pre">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-stripprefix"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="strip_pre" langtag="info-suchasstripprefix">
  </div>
  <div id="password">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-identificationkey"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="password" langtag="word-identificationkey">
    <p class="mt-1 text-xs text-gray-500" langtag="info-identificationkey"></p>
  </div>
  <div id="proto_version">
    <label class="block text-sm font-medium text-gray-700 mb-1">Proxy Protocol Version</label>
    <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" name="proto_version">
      <option value=""></option>
      <option value="V1">V1</option>
      <option value="V2">V2</option>
    </select>
    <p class="mt-1 text-xs text-gray-500">开启此功能，请确保本地的服务能够支持 Proxy Protocol 协议。</p>
  </div>
  <div class="border-t border-gray-100 pt-4">
    <button type="button" onclick="submitform('add', '{{.web_base_url}}/index/add', $('form').serializeArray())"
      class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
      <i class="fa fa-check-circle"></i> <span langtag="word-add"></span>
    </button>
  </div>
</form>
</div>
</div>
</div>
<script>
var arr = []
arr["all"] = ["port","target","password","local_path","strip_pre","local_proxy","client_id","server_ip"]
arr["tcp"] = ["port","target","local_proxy","client_id","server_ip","proto_version"]
arr["udp"] = ["port","target","local_proxy","client_id","server_ip"]
arr["socks5"] = ["port","client_id","server_ip"]
arr["httpProxy"] = ["port","client_id","server_ip"]
arr["secret"] = ["target","password","client_id","server_ip"]
arr["p2p"] = ["target","password","client_id","server_ip"]
arr["file"] = ["port","local_path","strip_pre","client_id","server_ip"]
function resetForm() {
  arr["all"].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display="none";});
  document.querySelectorAll("#usecase span").forEach(function(el){el.style.display="none";});
  var o=document.getElementById("type").value;
  var c=document.getElementById("case"+o);if(c)c.style.display="inline";
  (arr[o]||[]).forEach(function(id){var el=document.getElementById(id);if(el)el.style.display="block";});
}
$(function(){
  $("#type").val(('{{.type}}' == "") ? "tcp" : "{{.type}}");
  resetForm();
  $("#type").on("change",resetForm);
  getClientList();
});
function getClientList(){
  $("select[name='client_id']").empty();
  $.ajax({type:"POST",url:"{{.web_base_url}}/client/list",data:{order:"asc",offset:0,limit:999},dataType:"json",success:function(data){
    if(data&&data.rows&&data.rows.length>0){
      for(var i=0;i<data.rows.length;i++){
        var opt=$("<option>").val(data.rows[i].Id).text(data.rows[i].Id+"-"+data.rows[i].Remark);
        $("select[name='client_id']").append(opt);
      }
      $("select[name='client_id']").find("option[value='{{.client_id}}']").attr("selected",true);
    }
  }});
}
</script>
