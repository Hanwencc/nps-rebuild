<div class="max-w-2xl mx-auto space-y-5">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100">
            <h3 class="text-base font-semibold text-gray-800" langtag="word-globalparam"></h3>
        </div>
        <div class="p-6">
            <form class="space-y-4" onsubmit="return false">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-globalblackiplist"></label>
                    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none" rows="10" name="globalBlackIpList" langtag="info-suchasblackiplist">{{.globalBlackIpList}}</textarea>
                    <p class="mt-1 text-xs text-gray-500" langtag="info-descblackiplist"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-serverurl"></label>
                    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="serverUrl" value="{{.serverUrl}}" langtag="info-servertips">
                </div>
                <div class="border-t border-gray-100 pt-4">
                    <button type="button" onclick="submitform('global', '{{.web_base_url}}/global/save', $('form').serializeArray())"
                        class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
                        <i class="fa fa-check-circle"></i> <span langtag="word-save"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
window.addEventListener('resize', function() {
    for (var key in charts) { charts[key].resize(); }
});
</script>
