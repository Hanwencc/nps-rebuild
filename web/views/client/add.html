<div class="max-w-3xl mx-auto space-y-5">
<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
<div class="px-6 py-4 border-b border-gray-100">
  <h3 class="text-base font-semibold text-gray-800" langtag="page-clientadd"></h3>
</div>
<div class="p-6">
<form class="space-y-4" onsubmit="return false">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-remark"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="remark" langtag="word-remark">
  </div>
{{if eq true .allow_flow_limit}}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-flowlimit"></label>
    <div class="flex items-center gap-2">
      <input class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="flow_limit" langtag="info-unrestricted">
      <span class="text-sm text-gray-500"><span langtag="word-unit"></span>: M</span>
    </div>
  </div>
{{end}}
{{if eq true .allow_rate_limit}}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-ratelimit"></label>
    <div class="flex items-center gap-2">
      <input class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="rate_limit" langtag="info-unrestricted">
      <span class="text-sm text-gray-500"><span langtag="word-unit"></span>: KB/S</span>
    </div>
  </div>
{{end}}
{{if eq true .allow_connection_num_limit}}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-maxconnections"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="max_conn" langtag="info-unrestricted">
  </div>
{{end}}
{{if eq true .allow_tunnel_num_limit}}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-maxtunnels"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="max_tunnel" langtag="info-unrestricted">
  </div>
{{end}}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-basicusername"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="u" langtag="info-unrestricted">
    <p class="mt-1 text-xs text-gray-500" langtag="info-onlyproxy"></p>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-basicpassword"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="p" langtag="info-unrestricted">
    <p class="mt-1 text-xs text-gray-500" langtag="info-onlyproxy"></p>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-verifyKey"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="vkey" langtag="info-unrestricted">
    <p class="mt-1 text-xs text-gray-500" langtag="info-autogenerated"></p>
  </div>
{{if eq true .allow_user_login}}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-webusername"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="web_username" langtag="info-unrestricted">
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-webpassword"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="web_password" langtag="info-unrestricted">
  </div>
{{end}}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-connectbyconfig"></label>
    <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" name="config_conn_allow">
      <option value="1" langtag="word-yes"></option>
      <option value="0" langtag="word-no"></option>
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-ipwhite"></label>
    <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" name="ipwhite" onchange="changeIpWhite(this.value)">
      <option value="0" langtag="word-no"></option>
      <option value="1" langtag="word-yes"></option>
    </select>
  </div>
  <div id="Ip_white_pass" style="display:none">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-ipwhitepass"></label>
    <input class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" type="text" name="ipwhitepass" langtag="info-input-whitepass">
    <p class="mt-1 text-xs text-gray-500" langtag="info-ipwhitepass"></p>
  </div>
  <div id="ip_white_list" style="display:none">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-ipwhitelist"></label>
    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none" rows="4" name="ipwhitelist" langtag="info-suchasblackiplist">{{.BlackIpList}}</textarea>
    <p class="mt-1 text-xs text-gray-500" langtag="info-descblackiplist"></p>
  </div>
  <div id="black_ip_list">
    <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-blackiplist"></label>
    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none" rows="4" name="blackiplist" langtag="info-suchasblackiplist">{{.BlackIpList}}</textarea>
    <p class="mt-1 text-xs text-gray-500" langtag="info-descblackiplist"></p>
  </div>
  <div class="border-t border-gray-100 pt-4">
    <button type="button" onclick="submitform('add', '{{.web_base_url}}/client/add', $('form').serializeArray())"
      class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
      <i class="fa fa-check-circle"></i> <span langtag="word-add"></span>
    </button>
  </div>
</form>
</div>
</div>
</div>
<script>
function changeIpWhite(v) {
  if (v == '1') {
    document.getElementById('Ip_white_pass').style.display = 'block';
    document.getElementById('ip_white_list').style.display = 'block';
    document.getElementById('black_ip_list').style.display = 'none';
  } else {
    document.getElementById('Ip_white_pass').style.display = 'none';
    document.getElementById('ip_white_list').style.display = 'none';
    document.getElementById('black_ip_list').style.display = 'block';
  }
}
</script>
