<div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
            <h5 class="text-sm font-semibold text-gray-800" langtag="page-clientlist"></h5>
        </div>
        <div class="p-5">
            {{if eq true .isAdmin}}
            <div id="toolbar">
                <a href="{{.web_base_url}}/client/add"
                   class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg shadow-sm transition-colors">
                    <i class="fa fa-plus"></i> <span langtag="word-add"></span>
                </a>
            </div>
            {{end}}
            <table id="table"></table>
        </div>
    </div>
</div>

<script>
var isAdmin = {{if eq true .isAdmin}}true{{else}}false{{end}};
var bridgeType = "{{.bridgeType}}";

$('#table').bootstrapTable({
    toolbar: "#toolbar",
    method: 'post',
    url: "{{.web_base_url}}/client/list",
    contentType: "application/x-www-form-urlencoded",
    striped: true,
    search: true,
    showRefresh: true,
    pagination: true,
    sidePagination: 'server',
    pageNumber: 1,
    pageList: [10, 25, 50],
    detailView: true,
    onExpandRow: function () { $('body').setLang('.detail-view'); },
    onPostBody: function () { if ($(this)[0].locale != undefined) $('body').setLang('#table'); },
    detailFormatter: function (index, row) {
        var tls_p = '{{.tls_p}}';
        var tls_cmd = tls_p ? '<b langtag="word-tlsquicklycommand"></b>: <span>'
            + encodeToBase64(row.Remark + '|' + '{{.ip}}:' + tls_p + '|' + row.VerifyKey + '|true')
            + '</span>&emsp;<button class="copy" onclick="copyCommand(this)" data-clipboard-text="">澶嶅埗</button><br/>' : '';
        return '<div class="space-y-1">'
            + '<b langtag="word-maxconnections"></b>: ' + row.MaxConn + '&emsp;'
            + '<b langtag="word-curconnections"></b>: ' + row.NowConn + '&emsp;'
            + '<b langtag="word-flowlimit"></b>: ' + row.Flow.FlowLimit + 'm&emsp;'
            + '<b langtag="word-ratelimit"></b>: ' + row.RateLimit + 'KB/s&emsp;'
            + '<b langtag="word-maxtunnels"></b>: ' + row.MaxTunnelNum + '<br/>'
            + '<b langtag="word-webusername"></b>: ' + row.WebUserName + '&emsp;'
            + '<b langtag="word-webpassword"></b>: ' + row.WebPassword + '&emsp;'
            + '<b langtag="word-basicusername"></b>: ' + row.Cnf.U + '&emsp;'
            + '<b langtag="word-basicpassword"></b>: ' + row.Cnf.P + '<br/>'
            + '<b langtag="word-connectbyconfig"></b>: <span langtag="word-' + row.ConfigConnAllow + '"></span><br/>'
            + '<b langtag="word-ipwhite"></b>: ' + row.IpWhite + '&emsp;'
            + '<b langtag="word-ipwhitepass"></b>: ' + row.IpWhitePass + '<br/>'
            + '<b langtag="word-createtime"></b>: ' + row.CreateTime + '<br/>'
            + '<b langtag="word-lastonlinetime"></b>: ' + row.LastOnlineTime + '<br/>'
            + '<b langtag="word-quicklycommand"></b>: <span>'
            + encodeToBase64(row.Remark + '|' + '{{.ip}}:{{.p}}|' + row.VerifyKey + '|false')
            + '</span>&emsp;<button class="copy" onclick="copyCommand(this)" data-clipboard-text="">澶嶅埗</button><br/>'
            + tls_cmd
            + '<b langtag="word-commandclient"></b>: <code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=' + row.VerifyKey + ' -type=' + bridgeType + '</code>'
            + '<button class="copy" onclick="copyCommand(this)" data-clipboard-text="">澶嶅埗</button>'
            + '</div>';
    },
    columns: [
        { field: 'Id', title: '<span langtag="word-id"></span>', halign: 'center', visible: true },
        { field: 'Remark', title: '<span langtag="word-remark"></span>', halign: 'center', visible: true },
        { field: 'Version', title: '<span langtag="word-version"></span>', halign: 'center', visible: true },
        {
            field: 'VerifyKey', title: '<span langtag="word-verifykey"></span>', halign: 'center', visible: true,
            formatter: function (v, row) {
                return row.NoStore ? '<span langtag="word-publicvkey"></span>' : v;
            }
        },
        { field: 'Addr', title: '<span langtag="word-address"></span>', halign: 'center', visible: true },
        {
            field: 'InletFlow', title: '<span langtag="word-inletflow"></span>', halign: 'center', visible: true, sortable: true,
            formatter: function (v, row) { return changeunit(row.Flow.InletFlow); }
        },
        {
            field: 'ExportFlow', title: '<span langtag="word-exportflow"></span>', halign: 'center', visible: true, sortable: true,
            formatter: function (v, row) { return changeunit(row.Flow.ExportFlow); }
        },
        {
            field: 'IsConnect', title: '<span langtag="word-speed"></span>', halign: 'center', visible: true,
            formatter: function (v, row) { return changeunit(row.Rate.NowRate) + '/S'; }
        },
        {
            field: 'Status', title: '<span langtag="word-status"></span>', align: 'center', halign: 'center', visible: true,
            formatter: function (v) {
                return v ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700" langtag="word-open"></span>'
                         : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-500" langtag="word-close"></span>';
            }
        },
        {
            field: 'IsConnect', title: '<span langtag="word-connect"></span>', align: 'center', halign: 'center', visible: true,
            formatter: function (v) {
                return v ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700" langtag="word-online"></span>'
                         : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-500" langtag="word-offline"></span>';
            }
        },
        {
            field: 'option', title: '<span langtag="word-option"></span>', align: 'center', halign: 'center', visible: true,
            formatter: function (v, row) {
                var g = '<div class="flex items-center justify-center gap-1">';
                if (isAdmin) {
                    if (row.Status) {
                        g += '<a onclick="submitform(\'stop\',\'{{.web_base_url}}/client/changestatus\',{\'id\':' + row.Id + ',\'status\':0})" class="inline-flex items-center justify-center w-7 h-7 rounded-lg border border-amber-400 text-amber-600 hover:bg-amber-50 cursor-pointer" title="Stop"><i class="fa fa-pause text-xs"></i></a>';
                    } else {
                        g += '<a onclick="submitform(\'start\',\'{{.web_base_url}}/client/changestatus\',{\'id\':' + row.Id + ',\'status\':1})" class="inline-flex items-center justify-center w-7 h-7 rounded-lg border border-indigo-400 text-indigo-600 hover:bg-indigo-50 cursor-pointer" title="Start"><i class="fa fa-play text-xs"></i></a>';
                    }
                    g += '<a onclick="submitform(\'delete\',\'{{.web_base_url}}/client/del\',{\'id\':' + row.Id + '})" class="inline-flex items-center justify-center w-7 h-7 rounded-lg border border-red-400 text-red-500 hover:bg-red-50 cursor-pointer" title="Delete"><i class="fa fa-trash text-xs"></i></a>';
                }
                g += '<a href="{{.web_base_url}}/client/edit?id=' + row.Id + '" class="inline-flex items-center justify-center w-7 h-7 rounded-lg border border-green-400 text-green-600 hover:bg-green-50" title="Edit"><i class="fa fa-edit text-xs"></i></a>';
                g += '</div>';
                return g;
            }
        }
    ]
});
</script>
