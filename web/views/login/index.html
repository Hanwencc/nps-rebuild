<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title langtag="title-login"></title>
    <script src="{{.web_base_url}}/static/js/tailwind.min.js"></script>
    <link href="{{.web_base_url}}/static/css/fontawesome.min.css" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/solid.min.css" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/nps.css" rel="stylesheet">
    <script defer src="{{.web_base_url}}/static/js/alpine.min.js"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-gray-900 via-indigo-950 to-gray-900 flex flex-col">

    <!-- Top bar -->
    <header class="flex items-center justify-between px-6 py-4">
        <h1 class="text-white font-bold text-xl tracking-tight" langtag="application"></h1>
        <!-- Language dropdown -->
        <div class="relative" x-data="{ open: false }">
            <button id="languagemenu"
                    @click="open = !open"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 text-white text-sm transition-colors">
                <i class="fa fa-globe-asia"></i>
                <span class="text-xs"></span>
                <i class="fa fa-chevron-down text-xs opacity-60 ml-0.5"></i>
            </button>
            <ul id="languagedropdown"
                x-show="open"
                @click.outside="open=false"
                x-transition
                class="absolute right-0 mt-1.5 w-36 bg-white rounded-xl shadow-2xl border border-gray-100 py-1 z-50"
                style="display:none"></ul>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-4xl grid md:grid-cols-2 gap-8 items-center">

            <!-- Left: features -->
            <div class="text-white space-y-4 hidden md:block">
                <h2 class="text-3xl font-bold leading-tight" langtag="info-tagline"></h2>
                <ul class="space-y-2.5 text-sm text-white/70">
                    <li class="flex items-start gap-2"><i class="fa fa-check-circle text-indigo-400 mt-0.5"></i><span langtag="info-feature1"></span></li>
                    <li class="flex items-start gap-2"><i class="fa fa-check-circle text-indigo-400 mt-0.5"></i><span langtag="info-feature2"></span></li>
                    <li class="flex items-start gap-2"><i class="fa fa-check-circle text-indigo-400 mt-0.5"></i><span langtag="info-feature3"></span></li>
                    <li class="flex items-start gap-2"><i class="fa fa-check-circle text-indigo-400 mt-0.5"></i><span langtag="info-feature4"></span></li>
                    <li class="flex items-start gap-2"><i class="fa fa-check-circle text-indigo-400 mt-0.5"></i><span langtag="info-feature5"></span></li>
                    <li class="flex items-start gap-2"><i class="fa fa-check-circle text-indigo-400 mt-0.5"></i><span langtag="info-feature6"></span></li>
                    <li class="flex items-start gap-2"><i class="fa fa-check-circle text-indigo-400 mt-0.5"></i><span langtag="info-feature7"></span></li>
                    <li class="flex items-start gap-2"><i class="fa fa-check-circle text-indigo-400 mt-0.5"></i><span langtag="info-feature8"></span></li>
                    <li class="flex items-start gap-2"><i class="fa fa-check-circle text-indigo-400 mt-0.5"></i><span langtag="info-feature9"></span></li>
                </ul>
            </div>

            <!-- Right: login card -->
            <div class="bg-white rounded-2xl shadow-2xl p-8">
                <div class="mb-6 text-center">
                    <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 rounded-xl mb-3">
                        <i class="fa fa-lock text-white text-lg"></i>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900" langtag="title-login"></h3>
                </div>
                <form onsubmit="return false" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-username"></label>
                        <input name="username"
                               class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
                               langtag="word-username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-password"></label>
                        <input name="password" type="password"
                               class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
                               langtag="word-password">
                    </div>
                    {{if eq true .captcha_open}}
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-captcha"></label>
                        {{create_captcha}}
                        <input name="captcha"
                               class="w-full mt-2 px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
                               langtag="word-captcha">
                    </div>
                    {{end}}
                    <button onclick="login()"
                            class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-sm transition-colors shadow-sm"
                            langtag="word-login"></button>
                    {{if eq true .register_allow}}
                    <p class="text-center text-xs text-gray-500" langtag="info-noaccount"></p>
                    <a href="{{.web_base_url}}/login/register"
                       class="block text-center py-2 border border-gray-300 rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition-colors"
                       langtag="word-register"></a>
                    {{end}}
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="px-6 py-4 text-center text-xs text-white/40">
        <strong langtag="word-copyright"></strong> &nbsp;<span langtag="application"></span> &copy; 2018-2025
        &nbsp;路&nbsp;
        <span langtag="word-readmore"></span> <a href="https://ehang.io/nps" class="text-indigo-400 hover:underline" langtag="word-go"></a>
    </footer>
</body>
</html>

<script src="{{.web_base_url}}/static/js/jquery-3.4.1.min.js"></script>
<script src="{{.web_base_url}}/static/js/language.js?v=202512054"></script>
<script>
    window.nps = { "web_base_url": {{.web_base_url}} }

    function login() {
        $.ajax({
            type: "POST",
            url: "{{.web_base_url}}/login/verify",
            data: $("form").serializeArray(),
            success: function (res) {
                if (res.status) {
                    window.location.href = "{{.web_base_url}}/"
                } else {
                    alert(res.msg)
                }
            }
        })
    }
</script>
