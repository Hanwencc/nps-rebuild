<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title langtag="title-register"></title>
    <script src="{{.web_base_url}}/static/js/tailwind.min.js"></script>
    <link href="{{.web_base_url}}/static/css/fontawesome.min.css" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/solid.min.css" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/nps.css" rel="stylesheet">
    <script defer src="{{.web_base_url}}/static/js/alpine.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-indigo-950 to-gray-900 flex flex-col">
    <header class="flex items-center justify-between px-6 py-4">
        <h1 class="text-white font-bold text-xl tracking-tight" langtag="application"></h1>
        <div class="relative" x-data="{ open: false }">
            <button id="languagemenu" @click="open = !open" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 text-white text-sm transition-colors">
                <i class="fa fa-globe-asia"></i><span class="text-xs"></span>
            </button>
            <ul id="languagedropdown" x-show="open" @click.outside="open=false" x-transition
                class="absolute right-0 mt-1.5 w-36 bg-white rounded-xl shadow-2xl border border-gray-100 py-1 z-50" style="display:none"></ul>
        </div>
    </header>
    <main class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-sm">
            <div class="bg-white rounded-2xl shadow-2xl p-8">
                <div class="mb-6 text-center">
                    <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 rounded-xl mb-3">
                        <i class="fa fa-user-plus text-white text-lg"></i>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900" langtag="info-register"></h3>
                    <p class="text-sm text-gray-500 mt-1" langtag="info-createaccount"></p>
                </div>
                <form onsubmit="return false" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-username"></label>
                        <input type="text" name="username" class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" langtag="word-username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" langtag="word-password"></label>
                        <input type="password" name="password" class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" langtag="word-password">
                    </div>
                    <button onclick="register()" type="button" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-sm transition-colors" langtag="word-register"></button>
                    <p class="text-center text-xs text-gray-500" langtag="info-haveaccount"></p>
                    <a href="{{.web_base_url}}/login/index" class="block text-center py-2 border border-gray-300 rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition-colors" langtag="word-login"></a>
                </form>
            </div>
        </div>
    </main>
    <footer class="px-6 py-4 text-center text-xs text-white/40">
        <strong langtag="word-copyright"></strong> &nbsp;<span langtag="application"></span> &copy; 2018-2025
    </footer>
</body>
</html>
<script src="{{.web_base_url}}/static/js/jquery-3.4.1.min.js"></script>
<script src="{{.web_base_url}}/static/js/language.js?v=202512054"></script>
<script>
    window.nps = { "web_base_url": {{.web_base_url}} }
    function register() {
        $.ajax({ type: "POST", url: "{{.web_base_url}}/login/register", data: form.serializeArray(),
            success: function (res) { alert(res.msg); if (res.status) { window.location.href = "{{.web_base_url}}/login/index" } }
        })
    }
</script>
